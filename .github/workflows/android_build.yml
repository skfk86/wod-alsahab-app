name: Build Android Release AAB

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build --if-present

      - name: Capacitor Sync
        run: npx cap sync android

      # ── فك تشفير الـ Keystore من GitHub Secret ──
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      # ── بناء AAB موقّع للنشر على Play Store ──
      - name: Build Release AAB
        env:
          KEYSTORE_PATH:    release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload AAB to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Sudan-Weather-Release-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab

      # ── (اختياري) بناء APK للتوزيع المباشر ──
      - name: Build Release APK
        env:
          KEYSTORE_PATH:    release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Sudan-Weather-Release-APK
          path: android/app/build/outputs/apk/release/app-release.apk
# Force Trigger Build 2026
