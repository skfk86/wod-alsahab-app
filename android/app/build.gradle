// ══════════════════════════════════════════════════════════════════
// build.gradle (app) — ود السحاب v2.0 (طقس السودان)
// المسار: android/app/build.gradle
// ══════════════════════════════════════════════════════════════════

apply plugin: 'com.android.application'

android {
    // تحديد الـ Namespace لمطابقة كود الجافا والمانيفست
    namespace "com.wodalsahab.sudanweather"

    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.wodalsahab.sudanweather"
        minSdk    rootProject.ext.minSdkVersion    // 22
        targetSdk rootProject.ext.targetSdkVersion // 34
        versionCode 2
        versionName "2.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    packaging {
        resources {
            excludes += [
                'META-INF/LICENSE',
                'META-INF/LICENSE.txt',
                'META-INF/NOTICE',
                'META-INF/NOTICE.txt',
                'META-INF/*.kotlin_module'
            ]
        }
    }

    lint {
        abortOnError false
        checkReleaseBuilds false
    }
}

dependencies {
    // ─── الربط الأساسي مع Capacitor (حل مشكلة BridgeActivity) ───
    implementation project(':capacitor-android')

    // AndroidX Core
    implementation "androidx.appcompat:appcompat:$rootProject.ext.androidxAppCompatVersion"
    implementation "androidx.core:core:$rootProject.ext.androidxCoreVersion"
    implementation "androidx.activity:activity:$rootProject.ext.androidxActivityVersion"
    implementation "androidx.fragment:fragment:$rootProject.ext.androidxFragmentVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$rootProject.ext.androidxCoordinatorLayoutVersion"

    // الميزات المتقدمة (Splash Screen & WebKit)
    implementation "androidx.core:core-splashscreen:$rootProject.ext.coreSplashScreenVersion"
    implementation "androidx.webkit:webkit:$rootProject.ext.androidxWebkitVersion"

    // خدمات الخلفية والموقع (Wad Alsahab Core)
    implementation "androidx.work:work-runtime:$rootProject.ext.androidxWorkVersion"
    implementation "com.google.android.material:material:$rootProject.ext.materialVersion"
    implementation "com.google.android.gms:play-services-location:$rootProject.ext.playServicesLocationVersion"

    // التبعيات الخاصة بـ Capacitor Plugins (يتم سحبها تلقائياً عند المزامنة)
    implementation project(':capacitor-cordova-android-plugins')

    // Testing
    testImplementation "junit:junit:$rootProject.ext.junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$rootProject.ext.androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$rootProject.ext.androidxEspressoCoreVersion"
}

// دمج إعدادات المكونات الإضافية (Plugins)
apply from: 'capacitor.build.gradle'
